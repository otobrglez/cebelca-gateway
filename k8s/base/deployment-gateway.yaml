apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: cebelca-prod
data:
  APP_LOG_LEVEL: "INFO"
  OTEL_TRACES_EXPORTER: "none"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: cebelca-prod
  labels: { app: gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: registry.folk-decibel.ts.net/cebelca/gateway
          ports: [ { containerPort: 8080 } ]

          envFrom:
            - configMapRef: { name: gateway-config }
          env:
            - { name: PORT, value: "8080" }

          # livenessProbe:
          #   httpGet:
          #     path: /health/live
          #     port: 9000
          #   initialDelaySeconds: 60
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /health/ready
          #     port: 9000
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: cebelca-prod
spec:
  selector: { app: gateway }
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: cebelca-prod
  labels: { app: gateway }
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: cebelca-gateway.pinkstack.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port: { number: 80 }