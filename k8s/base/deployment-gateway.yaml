apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: cebelca-prod
data:
  APP_LOG_LEVEL: "INFO"
  OTEL_TRACES_EXPORTER: "none"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: cebelca-prod
  labels: { app: gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: registry.folk-decibel.ts.net/cebelca/gateway
          ports: [ { containerPort: 8080 } ]
          # args: [
          #   "start",
          #   "--metrics-enabled=true",
          #   "--proxy-headers=xforwarded",
          #   "--hostname-strict=true",
          #   "--http-enabled=true",
          #   "--hostname-debug=true",
          #   "--health-enabled=true",
          # ]
          env:
            - { name: APP_LOG_LEVEL, value: "INFO" }
            - { name: PORT, value: "8080" }

          # livenessProbe:
          #   httpGet:
          #     path: /health/live
          #     port: 9000
          #   initialDelaySeconds: 60
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /health/ready
          #     port: 9000
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: cebelca-prod
spec:
  selector: { app: gateway }
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
